name: Run Returns Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    # 👇 create credentials.json from secret
    - name: Create Google credentials file
      run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

    # 👇 create token.json from secret
    - name: Create Google token file
      run: echo '${{ secrets.GOOGLE_TOKEN }}' > token.json

    - name: Run automation
      run: node main.js