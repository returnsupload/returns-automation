name: Run Returns Automation

on:
  schedule:
    - cron: '0 0 * * *'   # runs daily
  workflow_dispatch:       # allows manual run button

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Get your repo files
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Install Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3️⃣ Install packages
      - name: Install dependencies
        run: npm install

      # 4️⃣ Create Google service account file from secret
      - name: Create service account file
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT }}' > service-account.json

      # 5️⃣ Run your automation script
      - name: Run automation
        run: node main.js
